    <rect x="370" y="525" width="90" height="90" class="cell-dark"/>
    <rect x="460" y="525" width="90" height="90" class="cell-light"/>
    <rect x="550" y="525" width="90" height="90" class="cell-dark"/>
    <rect x="640" y="525" width="90" height="90" class="cell-light"/>
    <rect x="730" y="525" width="90" height="90" class="cell-dark"/>

