  <!-- active symbol and magnet -->
  <use href="#cell-symbol" x="370" y="435" width="90" height="90"/>
  <circle cx="415" cy="480" r="20" fill="#16a34a" stroke="#14532d" stroke-width="3"/>
  <text x="415" y="488" text-anchor="middle" font="800 22px Arial" fill="#ffffff">N</text>

  <!-- axis labels -->
  <g>
    <text x="145" y="935" text-anchor="middle" class="axis">A</text>
    <text x="235" y="935" text-anchor="middle" class="axis">B</text>
    <text x="325" y="935" text-anchor="middle" class="axis">C</text>
    <text x="415" y="935" text-anchor="middle" class="axis">D</text>
    <text x="505" y="935" text-anchor="middle" class="axis">E</text>
    <text x="595" y="935" text-anchor="middle" class="axis">F</text>
    <text x="685" y="935" text-anchor="middle" class="axis">G</text>
    <text x="775" y="935" text-anchor="middle" class="axis">H</text>

    <text x="860" y="225" text-anchor="middle" class="axis">8</text>
    <text x="860" y="315" text-anchor="middle" class="axis">7</text>
    <text x="860" y="405" text-anchor="middle" class="axis">6</text>
    <text x="860" y="495" text-anchor="middle" class="axis">5</text>
    <text x="860" y="585" text-anchor="middle" class="axis">4</text>
    <text x="860" y="675" text-anchor="middle" class="axis">3</text>
    <text x="860" y="765" text-anchor="middle" class="axis">2</text>
    <text x="860" y="855" text-anchor="middle" class="axis">1</text>
  </g>

  <!-- bus labels -->
  <line x1="145" y1="970" x2="775" y2="970" class="col-wire"/>
  <text x="460" y="1012" text-anchor="middle" class="label" fill="#1d4ed8">Colunas A–H: saídas GPIO</text>

  <line x1="905" y1="210" x2="905" y2="850" class="row-wire"/>
  <text x="950" y="530" transform="rotate(90 950 530)" text-anchor="middle" class="label" fill="#c2410c">Linhas 1–8: entradas GPIO</text>

  <!-- highlight arrows -->
  <path d="M415 956 L415 525" class="arrow-blue"/>
  <path d="M885 480 L460 480" class="arrow-orange"/>

  <!-- zoom/callout panel -->
  <rect x="980" y="165" width="525" height="360" class="callout"/>
  <text x="1242" y="215" text-anchor="middle" class="label">Detalhe de uma casa</text>

  <rect x="1040" y="255" width="410" height="145" fill="#ffffff" stroke="#cbd5e1" stroke-width="3" rx="18"/>
  <line x1="1070" y1="328" x2="1140" y2="328" class="col-wire"/>
  <line x1="1380" y1="328" x2="1420" y2="328" class="row-wire"/>
  <text x="1105" y="292" text-anchor="middle" class="small" fill="#2563eb">COLUNA</text>
  <text x="1400" y="292" text-anchor="middle" class="small" fill="#ea580c">LINHA</text>

  <line x1="1145" y1="360" x2="1200" y2="305" class="reed"/>
  <line x1="1218" y1="287" x2="1270" y2="235" class="reed"/>
  <text x="1210" y="395" text-anchor="middle" class="small">reed switch</text>

  <polygon points="1280,328 1325,300 1325,356" fill="#f3e8ff" stroke="#7e22ce" stroke-width="5"/>
  <line x1="1340" y1="295" x2="1340" y2="362" class="diode"/>
  <text x="1320" y="395" text-anchor="middle" class="small">diodo</text>

  <circle cx="1198" cy="278" r="22" fill="#16a34a" stroke="#14532d" stroke-width="3"/>
  <text x="1198" y="286" text-anchor="middle" font="800 22px Arial" fill="#ffffff">N</text>

  <text x="1242" y="455" text-anchor="middle" class="text">Peça com ímã fecha o reed switch.</text>
  <text x="1242" y="488" text-anchor="middle" class="text">O diodo isola a casa na matriz.</text>

  <!-- explanation cards -->
  <rect x="980" y="575" width="250" height="130" class="blue-card"/>
  <text x="1105" y="620" text-anchor="middle" class="label">1</text>
  <text x="1105" y="655" text-anchor="middle" class="small">ESP32 ativa</text>
  <text x="1105" y="685" text-anchor="middle" class="small">uma coluna</text>

  <rect x="1255" y="575" width="250" height="130" class="orange-card"/>
  <text x="1380" y="620" text-anchor="middle" class="label">2</text>
  <text x="1380" y="655" text-anchor="middle" class="small">ESP32 lê</text>
  <text x="1380" y="685" text-anchor="middle" class="small">as linhas</text>

  <rect x="980" y="735" width="250" height="130" class="green-card"/>
  <text x="1105" y="780" text-anchor="middle" class="label">3</text>
  <text x="1105" y="815" text-anchor="middle" class="small">Reed fechado</text>
  <text x="1105" y="845" text-anchor="middle" class="small">indica peça</text>

  <rect x="1255" y="735" width="250" height="130" class="purple-card"/>
  <text x="1380" y="780" text-anchor="middle" class="label">4</text>
  <text x="1380" y="815" text-anchor="middle" class="small">Coluna + linha</text>
  <text x="1380" y="845" text-anchor="middle" class="small">identificam a casa</text>

  <rect x="980" y="910" width="525" height="85" class="note-card"/>
  <text x="1242" y="945" text-anchor="middle" class="label">Exemplo: coluna D + linha 5 = casa D5</text>
  <text x="1242" y="975" text-anchor="middle" class="small">A mesma lógica é repetida para as 64 casas do tabuleiro.</text>
