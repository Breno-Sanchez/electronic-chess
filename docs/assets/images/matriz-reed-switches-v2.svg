    <circle cx="685" cy="210" r="5" fill="#64748b"/>
    <circle cx="775" cy="210" r="5" fill="#64748b"/>

    <circle cx="145" cy="300" r="5" fill="#64748b"/>
    <circle cx="235" cy="300" r="5" fill="#64748b"/>
    <circle cx="325" cy="300" r="5" fill="#64748b"/>
    <circle cx="415" cy="300" r="5" fill="#64748b"/>
    <circle cx="505" cy="300" r="5" fill="#64748b"/>
