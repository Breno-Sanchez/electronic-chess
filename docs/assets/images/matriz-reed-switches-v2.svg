    <rect x="190" y="165" width="90" height="90" class="cell-dark"/>
    <rect x="280" y="165" width="90" height="90" class="cell-light"/>
    <rect x="370" y="165" width="90" height="90" class="cell-dark"/>
    <rect x="460" y="165" width="90" height="90" class="cell-light"/>
    <rect x="550" y="165" width="90" height="90" class="cell-dark"/>
