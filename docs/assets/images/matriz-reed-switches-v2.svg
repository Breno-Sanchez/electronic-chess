    <rect x="550" y="255" width="90" height="90" class="cell-light"/>
    <rect x="640" y="255" width="90" height="90" class="cell-dark"/>
    <rect x="730" y="255" width="90" height="90" class="cell-light"/>

    <rect x="100" y="345" width="90" height="90" class="cell-light"/>
    <rect x="190" y="345" width="90" height="90" class="cell-dark"/>
    <rect x="280" y="345" width="90" height="90" class="cell-light"/>
    <rect x="370" y="345" width="90" height="90" class="cell-dark"/>
    <rect x="460" y="345" width="90" height="90" class="cell-light"/>
    <rect x="550" y="345" width="90" height="90" class="cell-dark"/>
    <rect x="640" y="345" width="90" height="90" class="cell-light"/>
    <rect x="730" y="345" width="90" height="90" class="cell-dark"/>

