    <circle cx="325" cy="480" r="5" fill="#64748b"/>
    <circle cx="505" cy="480" r="5" fill="#64748b"/>
    <circle cx="595" cy="480" r="5" fill="#64748b"/>
    <circle cx="685" cy="480" r="5" fill="#64748b"/>
    <circle cx="775" cy="480" r="5" fill="#64748b"/>

    <circle cx="145" cy="570" r="5" fill="#64748b"/>
    <circle cx="235" cy="570" r="5" fill="#64748b"/>
    <circle cx="325" cy="570" r="5" fill="#64748b"/>
    <circle cx="415" cy="570" r="5" fill="#64748b"/>
    <circle cx="505" cy="570" r="5" fill="#64748b"/>
    <circle cx="595" cy="570" r="5" fill="#64748b"/>
    <circle cx="685" cy="570" r="5" fill="#64748b"/>
    <circle cx="775" cy="570" r="5" fill="#64748b"/>

    <circle cx="145" cy="660" r="5" fill="#64748b"/>
    <circle cx="235" cy="660" r="5" fill="#64748b"/>
    <circle cx="325" cy="660" r="5" fill="#64748b"/>
    <circle cx="415" cy="660" r="5" fill="#64748b"/>
    <circle cx="505" cy="660" r="5" fill="#64748b"/>
