    <circle cx="685" cy="660" r="5" fill="#64748b"/>
    <circle cx="775" cy="660" r="5" fill="#64748b"/>

    <circle cx="145" cy="750" r="5" fill="#64748b"/>
    <circle cx="235" cy="750" r="5" fill="#64748b"/>
    <circle cx="325" cy="750" r="5" fill="#64748b"/>
    <circle cx="415" cy="750" r="5" fill="#64748b"/>
    <circle cx="505" cy="750" r="5" fill="#64748b"/>
    <circle cx="595" cy="750" r="5" fill="#64748b"/>
    <circle cx="685" cy="750" r="5" fill="#64748b"/>
    <circle cx="775" cy="750" r="5" fill="#64748b"/>

    <circle cx="145" cy="840" r="5" fill="#64748b"/>
    <circle cx="235" cy="840" r="5" fill="#64748b"/>
    <circle cx="325" cy="840" r="5" fill="#64748b"/>
    <circle cx="415" cy="840" r="5" fill="#64748b"/>
