    <rect x="190" y="615" width="90" height="90" class="cell-light"/>
    <rect x="280" y="615" width="90" height="90" class="cell-dark"/>
    <rect x="370" y="615" width="90" height="90" class="cell-light"/>
    <rect x="460" y="615" width="90" height="90" class="cell-dark"/>
    <rect x="550" y="615" width="90" height="90" class="cell-light"/>
    <rect x="640" y="615" width="90" height="90" class="cell-dark"/>
    <rect x="730" y="615" width="90" height="90" class="cell-light"/>

    <rect x="100" y="705" width="90" height="90" class="cell-light"/>
    <rect x="190" y="705" width="90" height="90" class="cell-dark"/>
    <rect x="280" y="705" width="90" height="90" class="cell-light"/>
    <rect x="370" y="705" width="90" height="90" class="cell-dark"/>
    <rect x="460" y="705" width="90" height="90" class="cell-light"/>
    <rect x="550" y="705" width="90" height="90" class="cell-dark"/>
    <rect x="640" y="705" width="90" height="90" class="cell-light"/>
    <rect x="730" y="705" width="90" height="90" class="cell-dark"/>

    <rect x="100" y="795" width="90" height="90" class="cell-dark"/>
    <rect x="190" y="795" width="90" height="90" class="cell-light"/>
    <rect x="280" y="795" width="90" height="90" class="cell-dark"/>
    <rect x="370" y="795" width="90" height="90" class="cell-light"/>
    <rect x="460" y="795" width="90" height="90" class="cell-dark"/>
    <rect x="550" y="795" width="90" height="90" class="cell-light"/>
    <rect x="640" y="795" width="90" height="90" class="cell-dark"/>
    <rect x="730" y="795" width="90" height="90" class="cell-light"/>
  </g>

  <rect x="100" y="165" width="720" height="720" class="board-border"/>

  <!-- symbols in selected cells only + dots in all cells to reduce clutter -->
  <g opacity="0.85">
    <circle cx="145" cy="210" r="5" fill="#64748b"/>
    <circle cx="235" cy="210" r="5" fill="#64748b"/>
    <circle cx="325" cy="210" r="5" fill="#64748b"/>
    <circle cx="415" cy="210" r="5" fill="#64748b"/>
