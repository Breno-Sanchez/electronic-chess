    <rect x="280" y="435" width="90" height="90" class="cell-dark"/>
    <rect x="370" y="435" width="90" height="90" class="active-cell"/>
    <rect x="460" y="435" width="90" height="90" class="cell-dark"/>
    <rect x="550" y="435" width="90" height="90" class="cell-light"/>
    <rect x="640" y="435" width="90" height="90" class="cell-dark"/>
    <rect x="730" y="435" width="90" height="90" class="cell-light"/>

