<svg width="1600" height="1050" viewBox="0 0 1600 1050" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 800 46px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 24px Arial, sans-serif; fill: #475569; }
      .axis { font: 800 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 800 25px Arial, sans-serif; fill: #0f172a; }
      .text { font: 600 20px Arial, sans-serif; fill: #334155; }
      .small { font: 600 17px Arial, sans-serif; fill: #334155; }
      .tiny { font: 600 14px Arial, sans-serif; fill: #475569; }
      .cell-light { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .cell-dark { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 2; }
      .active-cell { fill: #bbf7d0; stroke: #16a34a; stroke-width: 6; }
      .col-hl { fill: #bfdbfe; opacity: 0.72; }
      .row-hl { fill: #fed7aa; opacity: 0.72; }
      .board-border { fill: none; stroke: #0f172a; stroke-width: 5; }
      .col-wire { stroke: #2563eb; stroke-width: 6; fill: none; stroke-linecap: round; }
      .row-wire { stroke: #ea580c; stroke-width: 6; fill: none; stroke-linecap: round; }
      .reed { stroke: #15803d; stroke-width: 4; fill: none; stroke-linecap: round; }
      .diode { stroke: #7e22ce; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .callout { fill: #f8fafc; stroke: #334155; stroke-width: 4; rx: 26; }
      .blue-card { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; rx: 18; }
      .orange-card { fill: #ffedd5; stroke: #ea580c; stroke-width: 3; rx: 18; }
      .green-card { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; rx: 18; }
      .purple-card { fill: #f3e8ff; stroke: #9333ea; stroke-width: 3; rx: 18; }
      .note-card { fill: #fef9c3; stroke: #a16207; stroke-width: 3; rx: 18; }
      .arrow { stroke: #0f172a; stroke-width: 5; fill: none; marker-end: url(#arrowhead); stroke-linecap: round; }
      .arrow-blue { stroke: #2563eb; stroke-width: 5; fill: none; marker-end: url(#arrowblue); stroke-linecap: round; }
      .arrow-orange { stroke: #ea580c; stroke-width: 5; fill: none; marker-end: url(#arroworange); stroke-linecap: round; }
    </style>

    <marker id="arrowhead" markerWidth="14" markerHeight="14" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 13 5, 0 10" fill="#0f172a"/>
    </marker>
    <marker id="arrowblue" markerWidth="14" markerHeight="14" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 13 5, 0 10" fill="#2563eb"/>
    </marker>
    <marker id="arroworange" markerWidth="14" markerHeight="14" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 13 5, 0 10" fill="#ea580c"/>
    </marker>

    <symbol id="cell-symbol" viewBox="0 0 90 90">
      <line x1="23" y1="62" x2="40" y2="45" class="reed"/>
      <line x1="47" y1="39" x2="64" y2="22" class="reed"/>
      <polygon points="36,58 47,69 49,51" fill="#f3e8ff" stroke="#7e22ce" stroke-width="3"/>
      <line x1="52" y1="48" x2="65" y2="61" class="diode"/>
    </symbol>
  </defs>

  <rect class="bg" width="1600" height="1050"/>

  <text x="800" y="62" text-anchor="middle" class="title">Matriz 8×8 de reed switches</text>
  <text x="800" y="100" text-anchor="middle" class="subtitle">Organização elétrica do tabuleiro: uma coluna é ativada e as linhas são lidas pelo ESP32</text>

  <!-- Board constants: x=100, y=165, cell=90, size=720 -->
  <!-- highlights for D5: file D index 3, rank 5 row from top rank 8 -> row 3 -->
  <rect x="370" y="165" width="90" height="720" class="col-hl"/>
  <rect x="100" y="435" width="720" height="90" class="row-hl"/>

  <!-- cells -->
  <g>
